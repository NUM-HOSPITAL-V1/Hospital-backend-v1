name: CI (Node.js Test)
run-name: "CI | ${{ github.event_name }} | ${{ github.ref_name }}"

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "terraform/**"
      - ".github/workflows/terraform.yaml"
  pull_request:
    paths-ignore:
      - "terraform/**"
      - ".github/workflows/terraform.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Хэрвээ тест байгаа бол:
      # - run: npm test

name: CI (Node.js Test)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Хэрвээ lint байгаа бол:
      # - run: npm run lint

      # Хэрвээ тест байгаа бол:
      # - run: npm test

      # - run: npm run build
name: Deploy to K3s (Helm)
run-name: "Deploy K3s | ${{ github.event.workflow_run.head_branch }} | ${{ github.event.workflow_run.head_sha }}"

on:
  workflow_run:
    workflows: ["Build & Push Docker Image"]
    types: [completed]
    branches: [main]


jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: [self-hosted, Linux, X64]
    environment: production

    env:
      K3S_NAMESPACE: num
      RELEASE_NAME: hospital-backend
      IMAGE_REPO: ${{ secrets.DOCKER_USERNAME }}/hospital-backend
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Debug runner host
        run: |
          hostname
          whoami
          helm version
          sudo kubectl version --client

      - name: Set up kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"

          if [ -n "${KUBECONFIG_CONTENT:-}" ]; then
            printf '%s\n' "${KUBECONFIG_CONTENT}" | tr -d '\r' > "$HOME/.kube/config"
          fi

          if ! kubectl --kubeconfig "$HOME/.kube/config" version --client >/dev/null 2>&1; then
            echo "Provided KUBECONFIG is missing/invalid. Falling back to /etc/rancher/k3s/k3s.yaml"
            sudo cp /etc/rancher/k3s/k3s.yaml "$HOME/.kube/config"
            sudo chown "$(id -u):$(id -g)" "$HOME/.kube/config"
          fi

          chmod 600 "$HOME/.kube/config"
          kubectl --kubeconfig "$HOME/.kube/config" cluster-info

      - name: Ensure namespace exists
        run: |
          sudo kubectl create namespace $K3S_NAMESPACE --dry-run=client -o yaml | sudo kubectl apply -f -

      - name: Upsert backend secret
        run: |
          cat <<EOF | sudo kubectl apply -n $K3S_NAMESPACE -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: hospital-secrets
          type: Opaque
          stringData:
            mongodb_uri: "${{ secrets.MONGODB_URI }}"
            JWT_SECRET: "${{ secrets.JWT_SECRET }}"
            REFRESH_SECRET: "${{ secrets.REFRESH_SECRET }}"
          EOF

      # Production-д чинь энэ "delete drift" хэсэг олонтаа хэрэггүй болдог.
      # Chart-аа зөв болговол upgrade өөрөө асуудалгүй явах ёстой.
      # Гэхдээ одоохондоо үлдээж болно.

      - name: Deploy Backend (Helm)
        run: |
          helm upgrade --install $RELEASE_NAME ./charts/hospital-backend \
            -n $K3S_NAMESPACE \
            --create-namespace \
            --set image.repository=$IMAGE_REPO \
            --set image.tag=$IMAGE_TAG \
            --set secrets.create=false \
            --set secrets.existingSecret=hospital-secrets \
            --wait --timeout 600s

      - name: Debug rollout on failure
        if: ${{ failure() }}
        run: |
          set +e
          sudo kubectl get pods -n "$K3S_NAMESPACE" -o wide
          sudo kubectl describe deployment/"$RELEASE_NAME" -n "$K3S_NAMESPACE"
          sudo kubectl describe pods -n "$K3S_NAMESPACE"
          sudo kubectl get events -n "$K3S_NAMESPACE" --sort-by=.metadata.creationTimestamp | tail -n 100

      - name: Verify
        run: |
          helm status $RELEASE_NAME -n $K3S_NAMESPACE
          sudo kubectl rollout status deployment/$RELEASE_NAME -n $K3S_NAMESPACE
          sudo kubectl get pods -n $K3S_NAMESPACE
          sudo kubectl get svc -n $K3S_NAMESPACE

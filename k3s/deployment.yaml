apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-backend
  namespace: num
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hospital-backend
  template:
    metadata:
      labels:
        app: hospital-backend
    spec:
      containers:
        - name: hospital-backend
          image: nurlannn/hospital-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: hospital-secrets
                  key: mongodb_uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hospital-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
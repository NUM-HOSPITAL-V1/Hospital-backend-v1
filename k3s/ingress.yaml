apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hospital-ingress
  namespace: num
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: hospital-backend
            port:
              number: 8000
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: hospital-backend
            port:
              number: 8000
